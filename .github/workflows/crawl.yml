name: media-crawl

# 媒体照合インデックスの定期更新。
# 各 enabled 媒体のRSSを巡回し、本文をSupabaseへupsert＋30日パージする。
# RSSは直近分しか出ないため、高頻度で回して "過去1か月" を貯め続けるのが要。

on:
  schedule:
    # UTCで4時間ごと（JSTでおおよそ 1:00, 5:00, 9:00, 13:00, 17:00, 21:00）
    - cron: "0 */4 * * *"
  workflow_dispatch: {}   # 手動実行も可能

# 同時実行を防ぐ（二重クロール防止）
concurrency:
  group: media-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests python-dotenv

      - name: Run crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python crawler.py
